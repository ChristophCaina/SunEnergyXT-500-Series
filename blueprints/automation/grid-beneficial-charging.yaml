blueprint:
  name: "SunEnergyXT – Grid-Beneficial Charging & Discharging"
  description: >
    **Version 2.0.0**

    Controls the SunEnergyXT battery storage using three operating modes
    selectable via a charging mode entity (input_select):

    **Grid-Beneficial (Netzdienlich):** Charges following a bell curve during
    the day, driven by PV surplus, forecast, SOC, and weather. PID mode handles
    all other situations (discharging on demand, evening, night, restart).

    **Price-Optimized (Preisoptimiert):** Charges from the grid during cheap
    hours (based on price rank or fixed threshold). Discharges during expensive
    hours via PID mode.

    **Combined (Kombiniert):** Uses whichever is more favorable — PV surplus
    charging OR cheap grid hours. Best of both worlds.

    **Required:** Battery GS, IS, SC, MM + charging mode select entity
    **Optional:** SA/SI, Solar Forecast (3×), Weather, Wallbox/EV (2×),
    Price sensor, Price rank sensor
  domain: automation
  author: "SunEnergyXT Community"
  homeassistant:
    min_version: "2024.6.0"
  source_url: "https://github.com/ChristophCaina/SunEnergyXT-500-Series/blob/main/blueprints/automation/grid-beneficial-charging.yaml"

  input:

    # =========================================================================
    # SPEICHER – Pflichtfelder
    # =========================================================================
    section_battery:
      name: "🔋 Speicher"
      icon: mdi:battery-charging
      collapsed: false
      input:

        battery_soc_sensor:
          name: "Speicher SOC (Sensor)"
          description: >
            Aktueller Ladestand des Speichers in Prozent.
            Typisch: sensor.{seriennummer}_sc
          selector:
            entity:
              filter:
                - device_class: battery

        battery_gs_number:
          name: "Grid Setpoint GS (Number)"
          description: >
            Steuert die Lade-/Entladeleistung. Negativ = Laden, Positiv = Entladen.
            Typisch: number.{seriennummer}_gs
          selector:
            entity:
              filter:
                - domain: number

        battery_is_number:
          name: "Max. Inverterleistung IS (Number)"
          description: >
            Maximale Lade-/Entladeleistung in Watt (Hardware-Obergrenze).
            Typisch: number.{seriennummer}_is
          selector:
            entity:
              filter:
                - domain: number

        battery_mm_switch:
          name: "Self-Consumption Modus MM (Switch)"
          description: >
            MM=0 beim aktiven Laden (Blueprint übernimmt Steuerung).
            MM=1 in allen anderen Situationen (interner PID übernimmt).
            Typisch: switch.{seriennummer}_mm
          selector:
            entity:
              filter:
                - domain: switch

    # =========================================================================
    # SPEICHER – SOC Grenzen (optional)
    # =========================================================================
    section_battery_limits:
      name: "🔋 Speicher – SOC Grenzen (optional)"
      icon: mdi:battery-arrow-up
      collapsed: true
      input:

        battery_sa_number:
          name: "Max. Charge SOC SA (Number, optional)"
          description: "Typisch: number.{seriennummer}_sa. Fallback: 100%"
          default:
          selector:
            entity:
              filter:
                - domain: number

        battery_si_number:
          name: "Min. Discharge SOC SI (Number, optional)"
          description: "Typisch: number.{seriennummer}_si. Fallback: 10%"
          default:
          selector:
            entity:
              filter:
                - domain: number

        discharge_reserve_soc:
          name: "Nacht-Reserve SOC (%)"
          description: >
            Speicher entlädt nicht unter diesen Wert.
            Ergänzt den SI-Wert des Geräts (der höhere Wert gilt). Standard: 15%
          default: 15
          selector:
            number:
              min: 0
              max: 50
              step: 5
              unit_of_measurement: "%"

    # =========================================================================
    # LADEMODUS – Umschalter
    # =========================================================================
    section_mode:
      name: "⚙️ Lademodus"
      icon: mdi:tune
      collapsed: false
      input:

        charging_mode_entity:
          name: "Lademodus (input_select Entity)"
          description: >
            Eine input_select Entity mit den Optionen:
            "Netzdienlich", "Preisoptimiert", "Kombiniert".
            Kann über das Dashboard jederzeit umgeschaltet werden.

            Erstelle unter Einstellungen → Helfer → Auswahlliste eine Entity
            mit genau diesen drei Werten.
          selector:
            entity:
              filter:
                - domain: input_select

    # =========================================================================
    # PV & NETZ
    # =========================================================================
    section_pv:
      name: "☀️ PV & Netz"
      icon: mdi:solar-power
      collapsed: false
      input:

        pv_power_sensor:
          name: "PV Leistung aktuell (Sensor)"
          description: >
            Aktuelle PV-Erzeugungsleistung in Watt (positiv).
            z.B. sensor.solaredge_i1_ac_power
          selector:
            entity:
              filter:
                - device_class: power

        grid_power_sensor:
          name: "Netzanschluss – Leistung (Sensor)"
          description: >
            Aktuelle Leistung am Netzanschlusspunkt in Watt.
            Positiv = Einspeisung (Überschuss), Negativ = Bezug (Bedarf).
            z.B. sensor.solaredge_i1_m1_ac_power
          selector:
            entity:
              filter:
                - device_class: power

        house_base_load:
          name: "Grundlast Haus (Watt)"
          description: "Geschätzter Mindest-Hausverbrauch. Standard: 300W"
          default: 300
          selector:
            number:
              min: 0
              max: 2000
              step: 50
              unit_of_measurement: "W"

        min_surplus_to_charge:
          name: "Mindest-Überschuss für aktives Laden (Watt)"
          description: >
            Erst ab diesem Überschuss schaltet der Blueprint in den aktiven
            Lademodus (MM=0). Nur relevant im Modus Netzdienlich / Kombiniert.
          default: 100
          selector:
            number:
              min: 0
              max: 1000
              step: 50
              unit_of_measurement: "W"

    # =========================================================================
    # SOLAR PROGNOSE (bis zu 3 Sensoren)
    # =========================================================================
    section_forecast:
      name: "📈 Solar-Prognose (optional)"
      icon: mdi:chart-bell-curve
      collapsed: true
      input:

        solar_forecast_sensor_1:
          name: "Solar-Prognose Sensor 1 (optional)"
          description: >
            Prognostizierter PV-Ertrag für heute in kWh.
            z.B. sensor.energy_production_today (Forecast.Solar)
            oder sensor.solcast_pv_forecast_forecast_today
          default:
          selector:
            entity: {}

        solar_forecast_sensor_2:
          name: "Solar-Prognose Sensor 2 (optional)"
          description: "Zweite Dachfläche / zweiter String. Wird addiert."
          default:
          selector:
            entity: {}

        solar_forecast_sensor_3:
          name: "Solar-Prognose Sensor 3 (optional)"
          description: "Dritter Forecast-Sensor. Wird addiert."
          default:
          selector:
            entity: {}

        forecast_good_threshold:
          name: "Schwellwert 'gute Prognose' (kWh)"
          description: "Ab diesem Wert: Ladebeginn erst später. Standard: 15 kWh"
          default: 15
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: "kWh"

    # =========================================================================
    # WETTER
    # =========================================================================
    section_weather:
      name: "🌤️ Wetter (optional)"
      icon: mdi:weather-partly-cloudy
      collapsed: true
      input:

        weather_entity:
          name: "Wetter Entity (optional)"
          description: "z.B. weather.forecast_home"
          default:
          selector:
            entity:
              filter:
                - domain: weather

        cloud_cover_sensor:
          name: "Bewölkung Sensor in % (optional)"
          description: "0–100%. Hat Vorrang vor der Wetter-Entity."
          default:
          selector:
            entity: {}

    # =========================================================================
    # E-AUTO / WALLBOX
    # =========================================================================
    section_ev:
      name: "🚗 E-Auto & Wallbox (optional)"
      icon: mdi:car-electric
      collapsed: true
      input:

        wallbox_power_sensor:
          name: "Wallbox Ladeleistung (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: power

        wallbox_soc_sensor:
          name: "Wallbox – Fahrzeug SOC (optional)"
          description: "Hat Vorrang vor den Fahrzeug-SOC-Sensoren."
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev1_charging_power_sensor:
          name: "Fahrzeug 1 – Ladeleistung (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: power

        ev1_soc_sensor:
          name: "Fahrzeug 1 – SOC (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev2_charging_power_sensor:
          name: "Fahrzeug 2 – Ladeleistung (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: power

        ev2_soc_sensor:
          name: "Fahrzeug 2 – SOC (optional)"
          default:
          selector:
            entity:
              filter:
                - device_class: battery

        ev_target_soc:
          name: "E-Auto Ziel-SOC (%)"
          description: "Ab diesem SOC gibt das E-Auto Priorität an den Speicher zurück."
          default: 80
          selector:
            number:
              min: 20
              max: 100
              step: 5
              unit_of_measurement: "%"

    # =========================================================================
    # LADEKURVE & TIMING (Netzdienlich / Kombiniert)
    # =========================================================================
    section_charge_curve:
      name: "⏱️ Ladekurve & Timing"
      icon: mdi:chart-bell-curve-cumulative
      collapsed: false
      input:

        charge_start_hour_good:
          name: "Ladebeginn bei guter Prognose (Stunde)"
          description: "Standard: 10 Uhr"
          default: 10
          selector:
            number:
              min: 6
              max: 14
              step: 1
              unit_of_measurement: "h"

        charge_start_hour_poor:
          name: "Ladebeginn bei schlechter Prognose (Stunde)"
          description: "Standard: 8 Uhr"
          default: 8
          selector:
            number:
              min: 6
              max: 12
              step: 1
              unit_of_measurement: "h"

        charge_peak_hour:
          name: "Ladekurven-Peak (Stunde)"
          description: "Tageszeit mit maximaler Ladeleistung. Standard: 13 Uhr"
          default: 13
          selector:
            number:
              min: 10
              max: 15
              step: 1
              unit_of_measurement: "h"

        charge_end_hour:
          name: "Aktives Laden – Ende (Stunde)"
          description: "Ab hier: PID übernimmt. Standard: 17 Uhr"
          default: 17
          selector:
            number:
              min: 14
              max: 20
              step: 1
              unit_of_measurement: "h"

        curve_aggressiveness:
          name: "Kurven-Aggressivität (1–5)"
          description: "1 = sanft linear. 5 = schnell auf Maximum, lange dort."
          default: 3
          selector:
            number:
              min: 1
              max: 5
              step: 1

        soc_throttle_threshold:
          name: "SOC-Drosselungsschwelle (%)"
          description: "Ab diesem SOC wird Ladeleistung linear auf 0 reduziert. Standard: 80%"
          default: 80
          selector:
            number:
              min: 50
              max: 95
              step: 5
              unit_of_measurement: "%"

        update_interval_minutes:
          name: "Aktualisierungsintervall (Minuten)"
          default: 5
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "min"

    # =========================================================================
    # STROMPREIS (Preisoptimiert / Kombiniert)
    # =========================================================================
    section_price:
      name: "💶 Strompreis (Preisoptimiert / Kombiniert)"
      icon: mdi:cash-clock
      collapsed: true
      input:

        price_sensor:
          name: "Strompreis – aktueller Wert (Sensor)"
          description: >
            Aktueller Strompreis in €/kWh oder ct/kWh.
            Wird nur als Fallback genutzt wenn kein Rang-Sensor konfiguriert ist.

            Kompatibel mit: EPEX Spot (sensor.epex_spot_de_net_price),
            Nord Pool, Tibber, aWATTar, oder jedem anderen Preis-Sensor.
          default:
          selector:
            entity:
              filter:
                - domain: sensor

        price_rank_sensor:
          name: "Preisrang-Sensor (optional, empfohlen)"
          description: >
            Sensor der angibt wie günstig die aktuelle Stunde im Tagesvergleich ist.

            EPEX Spot: sensor.epex_spot_de_rank
              → Wert 0 = günstigste Stunde des Tages
              → Wert 23 = teuerste Stunde des Tages

            EPEX Spot Quantile: sensor.epex_spot_de_quantile
              → Wert 0.0–1.0: Position im Tagespreisspektrum
              → 0.0 = günstigste, 1.0 = teuerste Stunde

            Wenn dieser Sensor konfiguriert ist, wird der feste Preisschwellwert
            ignoriert und stattdessen die günstigsten N Stunden des Tages genutzt.
          default:
          selector:
            entity:
              filter:
                - domain: sensor

        price_rank_type:
          name: "Typ des Rang-Sensors"
          description: >
            Rank: ganzzahlig 0–23 (EPEX Spot sensor.*_rank)
            Quantile: Dezimalwert 0.0–1.0 (EPEX Spot sensor.*_quantile)
          default: "rank"
          selector:
            select:
              options:
                - label: "Rang (0–23, EPEX Spot rank)"
                  value: "rank"
                - label: "Quantile (0.0–1.0, EPEX Spot quantile)"
                  value: "quantile"

        price_cheapest_hours:
          name: "Günstigste N Stunden laden (bei Rang-Sensor)"
          description: >
            Wie viele der günstigsten Stunden pro Tag aktiv geladen werden soll.
            Rang-Modus: Laden wenn Rang ≤ N-1 (z.B. 4 = Rang 0,1,2,3)
            Quantile-Modus: Laden wenn Quantile ≤ N/24
            Standard: 4 Stunden
          default: 4
          selector:
            number:
              min: 1
              max: 12
              step: 1
              unit_of_measurement: "h"

        price_threshold:
          name: "Fixer Preisschwellwert (Fallback ohne Rang-Sensor)"
          description: >
            Laden wenn aktueller Preis ≤ diesem Wert.
            Einheit muss zur Einheit des Preis-Sensors passen
            (z.B. 0.20 für €/kWh oder 20.0 für ct/kWh).
          default: 0.20
          selector:
            number:
              min: 0
              max: 1
              step: 0.01
              unit_of_measurement: "€/kWh"

        max_grid_charge_power:
          name: "Max. Ladeleistung aus Netz (Watt)"
          description: >
            Maximale Leistung beim Laden aus dem Netz (Preisoptimiert / Kombiniert).
            Sollte ≤ IS des Speichers sein. Standard: 800W
          default: 800
          selector:
            number:
              min: 100
              max: 2400
              step: 100
              unit_of_measurement: "W"

        price_soc_target:
          name: "Ziel-SOC beim Preisladen (%)"
          description: >
            Speicher lädt beim Preisladen nicht über diesen SOC.
            Verhindert volles Laden wenn Preise nur mäßig günstig sind.
            Standard: 90%
          default: 90
          selector:
            number:
              min: 20
              max: 100
              step: 5
              unit_of_measurement: "%"

# =============================================================================
# VARIABLEN
# =============================================================================
variables:
  _soc_sensor:          !input battery_soc_sensor
  _gs_number:           !input battery_gs_number
  _is_number:           !input battery_is_number
  _mm_switch:           !input battery_mm_switch
  _sa_number:           !input battery_sa_number
  _si_number:           !input battery_si_number
  _dis_reserve_soc:     !input discharge_reserve_soc
  _mode_entity:         !input charging_mode_entity
  _pv_sensor:           !input pv_power_sensor
  _grid_sensor:         !input grid_power_sensor
  _base_load:           !input house_base_load
  _min_surplus:         !input min_surplus_to_charge
  _fc1:                 !input solar_forecast_sensor_1
  _fc2:                 !input solar_forecast_sensor_2
  _fc3:                 !input solar_forecast_sensor_3
  _fc_good_thresh:      !input forecast_good_threshold
  _weather:             !input weather_entity
  _cloud_sensor:        !input cloud_cover_sensor
  _wb_power:            !input wallbox_power_sensor
  _wb_soc:              !input wallbox_soc_sensor
  _ev1_power:           !input ev1_charging_power_sensor
  _ev1_soc:             !input ev1_soc_sensor
  _ev2_power:           !input ev2_charging_power_sensor
  _ev2_soc:             !input ev2_soc_sensor
  _ev_target_soc:       !input ev_target_soc
  _start_good:          !input charge_start_hour_good
  _start_poor:          !input charge_start_hour_poor
  _peak_hour:           !input charge_peak_hour
  _end_hour:            !input charge_end_hour
  _aggressiveness:      !input curve_aggressiveness
  _soc_throttle:        !input soc_throttle_threshold
  _price_sensor:        !input price_sensor
  _rank_sensor:         !input price_rank_sensor
  _rank_type:           !input price_rank_type
  _cheapest_hours:      !input price_cheapest_hours
  _price_threshold:     !input price_threshold
  _max_grid_power:      !input max_grid_charge_power
  _price_soc_target:    !input price_soc_target

# =============================================================================
# TRIGGER
# =============================================================================
trigger:
  - platform: time_pattern
    minutes: !input update_interval_minutes

  # Sofortige Reaktion bei EV-Statusänderung
  - platform: state
    entity_id: !input wallbox_power_sensor
  - platform: state
    entity_id: !input ev1_charging_power_sensor
  - platform: state
    entity_id: !input ev2_charging_power_sensor

  # Sofortige Reaktion bei Moduswechsel
  - platform: state
    entity_id: !input charging_mode_entity

  # Stündlicher Trigger für Preisänderungen (zur vollen Stunde)
  - platform: time_pattern
    hours: "/1"

  - platform: sun
    event: sunrise
    offset: "00:30:00"
  - platform: sun
    event: sunset

  - platform: homeassistant
    event: start

# =============================================================================
# ACTION
# =============================================================================
action:
  # ---------------------------------------------------------------------------
  # SCHRITT 1: Gemeinsame Werte berechnen
  # ---------------------------------------------------------------------------
  - variables:
      current_hour: "{{ now().hour + now().minute / 60.0 }}"

      # Aktiver Modus aus input_select
      active_mode: "{{ states(_mode_entity) }}"

      # SOC-Grenzen
      soc_max: >
        {% if _sa_number and states(_sa_number) not in ['unknown','unavailable'] %}
          {{ states(_sa_number) | float(100) }}
        {% else %}
          100
        {% endif %}
      soc_min: >
        {% if _si_number and states(_si_number) not in ['unknown','unavailable'] %}
          {{ states(_si_number) | float(10) }}
        {% else %}
          10
        {% endif %}
      soc_current: "{{ states(_soc_sensor) | float(0) }}"

      # Hardware-Limit
      is_max: "{{ states(_is_number) | float(800) }}"

      # PV & Netz
      pv_now:   "{{ states(_pv_sensor)   | float(0) }}"
      grid_now: "{{ states(_grid_sensor) | float(0) }}"

      # E-Auto
      ev_power_total: >
        {% set wb = states(_wb_power)  | float(0) if _wb_power  else 0 %}
        {% set e1 = states(_ev1_power) | float(0) if _ev1_power else 0 %}
        {% set e2 = states(_ev2_power) | float(0) if _ev2_power else 0 %}
        {{ wb if wb > 0 else (e1 + e2) }}

      ev_soc_current: >
        {% if _wb_soc and states(_wb_soc) not in ['unknown','unavailable'] %}
          {{ states(_wb_soc) | float(100) }}
        {% elif _ev1_power and states(_ev1_power) | float(0) > 50 and _ev1_soc %}
          {{ states(_ev1_soc) | float(100) }}
        {% elif _ev2_power and states(_ev2_power) | float(0) > 50 and _ev2_soc %}
          {{ states(_ev2_soc) | float(100) }}
        {% else %}
          100
        {% endif %}

      ev_needs_priority: >
        {{ ev_power_total > 50 and ev_soc_current < _ev_target_soc }}

      # Solar-Prognose
      forecast_today_kwh: >
        {% set f1 = states(_fc1) | float(0) if _fc1 else 0 %}
        {% set f2 = states(_fc2) | float(0) if _fc2 else 0 %}
        {% set f3 = states(_fc3) | float(0) if _fc3 else 0 %}
        {{ f1 + f2 + f3 }}

      forecast_is_good:  "{{ forecast_today_kwh >= _fc_good_thresh }}"
      charge_start_hour: "{{ _start_good if forecast_is_good else _start_poor }}"

      # Bewölkung
      cloud_cover: >
        {% if _cloud_sensor and states(_cloud_sensor) not in ['unknown','unavailable'] %}
          {{ states(_cloud_sensor) | float(0) }}
        {% elif _weather and states(_weather) not in ['unknown','unavailable'] %}
          {% set cond = state_attr(_weather, 'condition') | default('') %}
          {% if   cond in ['sunny','clear-night']           %}0
          {% elif cond in ['partlycloudy']                  %}35
          {% elif cond in ['cloudy']                        %}70
          {% elif cond in ['rainy','pouring','snowy','fog'] %}90
          {% else                                           %}50
          {% endif %}
        {% else %}
          0
        {% endif %}

      weather_factor: >
        {{ [1.0 - (cloud_cover | float(0) / 100.0 * 0.75), 0.1] | max | round(4) }}

      # ------------------------------------------------------------------
      # LADEKURVE (Netzdienlich / Kombiniert)
      # ------------------------------------------------------------------
      curve_factor: >
        {% set h   = current_hour %}
        {% set t_s = charge_start_hour | float %}
        {% set t_p = _peak_hour | float %}
        {% set t_e = _end_hour  | float %}
        {% set a   = _aggressiveness | float(3) %}
        {% if h < t_s or h >= t_e %}
          0.0
        {% elif h <= t_p %}
          {{ ((h - t_s) / (t_p - t_s)) ** (1.0 / a) | round(4) }}
        {% else %}
          {{ ((t_e - h) / (t_e - t_p)) ** (1.0 / a) | round(4) }}
        {% endif %}

      # ------------------------------------------------------------------
      # SOC-Drosselung (Netzdienlich / Kombiniert)
      # ------------------------------------------------------------------
      soc_factor: >
        {% set s     = soc_current | float %}
        {% set s_max = soc_max     | float %}
        {% set s_thr = _soc_throttle | float %}
        {% if s >= s_max %}
          0.0
        {% elif s >= s_thr %}
          {{ (0.5 * (s_max - s) / [s_max - s_thr, 1] | max) | round(4) }}
        {% else %}
          1.0
        {% endif %}

      # ------------------------------------------------------------------
      # Überschuss & netzdienliche Zielleistung
      # ------------------------------------------------------------------
      ev_deduction: "{{ ev_power_total if ev_needs_priority else 0 }}"
      available_surplus: "{{ [grid_now - ev_deduction, 0] | max }}"

      target_charge_power_grid_beneficial: >
        {% set raw     = available_surplus * curve_factor * soc_factor * weather_factor %}
        {% set limited = [raw, is_max] | min %}
        {{ 0 if limited < _min_surplus else (limited | round(0) | int) }}

      # ------------------------------------------------------------------
      # STROMPREIS: Ist die aktuelle Stunde günstig?
      #
      # Rang-Sensor (empfohlen):
      #   EPEX rank:     Wert 0–23, 0 = günstigste Stunde
      #                  → günstig wenn rank < _cheapest_hours
      #   EPEX quantile: Wert 0.0–1.0, 0.0 = günstigste Stunde
      #                  → günstig wenn quantile < (_cheapest_hours / 24)
      #
      # Fixer Schwellwert (Fallback):
      #   → günstig wenn aktueller Preis ≤ _price_threshold
      # ------------------------------------------------------------------
      price_is_cheap: >
        {% if _rank_sensor and states(_rank_sensor) not in ['unknown','unavailable'] %}
          {% set rank_val = states(_rank_sensor) | float(99) %}
          {% if _rank_type == 'quantile' %}
            {{ rank_val <= (_cheapest_hours / 24.0) }}
          {% else %}
            {{ rank_val < _cheapest_hours }}
          {% endif %}
        {% elif _price_sensor and states(_price_sensor) not in ['unknown','unavailable'] %}
          {{ states(_price_sensor) | float(99) <= _price_threshold }}
        {% else %}
          false
        {% endif %}

      # Preis-SOC-Limit: beim Preisladen nicht über diesen Wert laden
      price_soc_ok: "{{ soc_current < _price_soc_target }}"

      # Netzladen-Leistung (begrenzt auf max_grid_charge_power und IS)
      target_charge_power_price: >
        {% if price_is_cheap and price_soc_ok %}
          {{ [_max_grid_power, is_max] | min | int }}
        {% else %}
          0
        {% endif %}

      # ------------------------------------------------------------------
      # FINALE BETRIEBSENTSCHEIDUNG je nach aktivem Modus
      # ------------------------------------------------------------------
      operating_mode: >
        {% set soc_ok = soc_current < soc_max %}

        {% if active_mode == 'Netzdienlich' %}
          {# Aktives Laden nur bei Überschuss + Kurve + SOC ok #}
          {% if target_charge_power_grid_beneficial > 0 and soc_ok %}
            active_charge_grid_beneficial
          {% else %}
            pid_mode
          {% endif %}

        {% elif active_mode == 'Preisoptimiert' %}
          {# Aktives Laden nur wenn Preis günstig und SOC-Ziel nicht erreicht #}
          {% if price_is_cheap and price_soc_ok and soc_ok %}
            active_charge_price
          {% else %}
            pid_mode
          {% endif %}

        {% elif active_mode == 'Kombiniert' %}
          {# Preis günstig → Preisladen (hat Vorrang) #}
          {% if price_is_cheap and price_soc_ok and soc_ok %}
            active_charge_price
          {# PV-Überschuss + Kurve → netzdienlich laden #}
          {% elif target_charge_power_grid_beneficial > 0 and soc_ok %}
            active_charge_grid_beneficial
          {# Sonst PID #}
          {% else %}
            pid_mode
          {% endif %}

        {% else %}
          {# Unbekannter Modus → sicherer Zustand #}
          pid_mode
        {% endif %}

      # Finaler GS-Wert je nach Untermodus
      gs_value: >
        {% if operating_mode == 'active_charge_price' %}
          {{ -(target_charge_power_price | int) }}
        {% elif operating_mode == 'active_charge_grid_beneficial' %}
          {{ -(target_charge_power_grid_beneficial | int) }}
        {% else %}
          0
        {% endif %}

  # ---------------------------------------------------------------------------
  # SCHRITT 2: Modus ausführen
  # ---------------------------------------------------------------------------
  - choose:

      # ════════════════════════════════════════════════════════════════════════
      # AKTIVES LADEN – Netzdienlich (MM=0, GS negativ, Kurvenleistung)
      # ════════════════════════════════════════════════════════════════════════
      - conditions:
          - condition: template
            value_template: "{{ operating_mode == 'active_charge_grid_beneficial' }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input battery_mm_switch
          - service: number.set_value
            target:
              entity_id: !input battery_gs_number
            data:
              value: "{{ gs_value }}"
          - service: system_log.write
            data:
              message: >
                [SunEnergyXT] LADEN – Netzdienlich |
                {{ now().strftime('%H:%M') }} |
                SOC: {{ soc_current }}% / max: {{ soc_max }}% |
                PV: {{ pv_now }}W | Grid: {{ grid_now }}W |
                EV: {{ ev_power_total }}W (Prio: {{ ev_needs_priority }}) |
                Prognose: {{ forecast_today_kwh }}kWh |
                Bewölkung: {{ cloud_cover }}% (Faktor: {{ weather_factor }}) |
                Kurve: {{ curve_factor }} | SOC-Faktor: {{ soc_factor }} |
                Überschuss: {{ available_surplus }}W → GS: {{ gs_value }}W
              level: debug

      # ════════════════════════════════════════════════════════════════════════
      # AKTIVES LADEN – Preisoptimiert (MM=0, GS negativ, volle Leistung)
      # ════════════════════════════════════════════════════════════════════════
      - conditions:
          - condition: template
            value_template: "{{ operating_mode == 'active_charge_price' }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input battery_mm_switch
          - service: number.set_value
            target:
              entity_id: !input battery_gs_number
            data:
              value: "{{ gs_value }}"
          - service: system_log.write
            data:
              message: >
                [SunEnergyXT] LADEN – Preisoptimiert |
                {{ now().strftime('%H:%M') }} |
                SOC: {{ soc_current }}% / Ziel: {{ _price_soc_target }}% |
                Preis günstig: {{ price_is_cheap }} |
                {% if _rank_sensor %}Rang: {{ states(_rank_sensor) }} (Typ: {{ _rank_type }})
                {% else %}Preis: {{ states(_price_sensor) }} ≤ {{ _price_threshold }}{% endif %} |
                GS: {{ gs_value }}W
              level: debug

      # ════════════════════════════════════════════════════════════════════════
      # PID-MODUS (MM=1, GS=0)
      # Tagsüber Entladung bei Bedarf, abends, nachts, Neustart
      # ════════════════════════════════════════════════════════════════════════
    default:
      - service: number.set_value
        target:
          entity_id: !input battery_gs_number
        data:
          value: 0
      - service: switch.turn_on
        target:
          entity_id: !input battery_mm_switch
      - service: system_log.write
        data:
          message: >
            [SunEnergyXT] PID-MODUS (MM=1, GS=0) |
            {{ now().strftime('%H:%M') }} |
            Modus: {{ active_mode }} |
            SOC: {{ soc_current }}% | PV: {{ pv_now }}W | Grid: {{ grid_now }}W |
            Grund: {% if active_mode == 'Preisoptimiert' %}
              {% if not price_is_cheap %}Preis nicht günstig
              {% elif not price_soc_ok %}SOC-Ziel erreicht ({{ soc_current }}% ≥ {{ _price_soc_target }}%)
              {% else %}SOC voll{% endif %}
            {%- elif current_hour < (charge_start_hour | float) %}vor Ladezeit
            {%- elif current_hour >= (_end_hour | float) %}nach Ladezeit
            {%- elif soc_current >= soc_max %}Speicher voll
            {%- elif target_charge_power_grid_beneficial == 0 %}kein Überschuss
            {%- else %}sonstige Bedingung{% endif %}
          level: debug

mode: single
max_exceeded: silent
